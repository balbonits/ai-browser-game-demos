<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>games · jdilig.me</title>
    <meta name="description" content="A library of browser games built entirely by AI under John Dilig's direction. Code by Claude Code, art by PixelLab, audio synthesized in code." />
    <meta name="copyright" content="© 2026 John Dilig" />
    <meta name="author" content="John Dilig" />

    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Theme bootstrap: read saved theme before paint to avoid flash. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('jdilig-theme');
          if (saved === 'dark' || saved === 'light') {
            document.documentElement.dataset.theme = saved;
          } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.dataset.theme = 'dark';
          }
        } catch (_) {}
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
