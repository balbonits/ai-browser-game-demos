<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maze Runner · AI Browser Game Demos</title>
  <meta name="description" content="Maze Runner — procedurally generated mazes seeded by a string or number. Built entirely by AI." />
  <meta name="copyright" content="© 2026 John Dilig" />
  <meta name="author" content="John Dilig" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a class="back" href="../../index.html">← all games</a>

  <div class="stage">
    <div class="frame">
      <canvas id="game" width="480" height="270"></canvas>
      <div class="hud-top">
        <button
          class="sound-toggle"
          id="sound-toggle"
          type="button"
          aria-label="Mute sound"
          title="Mute / unmute (M)"
        >🔊</button>
      </div>
    </div>
    <div class="meta">
      <strong>Maze Runner</strong> — find the exit before time runs out.
      <kbd>WASD</kbd>/<kbd>↑↓←→</kbd> move ·
      <kbd>R</kbd> new maze ·
      <kbd>E</kbd> enter custom seed ·
      <kbd>1</kbd>/<kbd>2</kbd>/<kbd>3</kbd> size ·
      <kbd>M</kbd> mute
    </div>
    <div class="legal-strip">
      © 2026 John Dilig ·
      code <a href="../../LICENSE">MIT</a> ·
      all visuals and audio synthesized in code (no third-party assets) ·
      <a href="../../credits.html">credits</a>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
